<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script> -->
    <!-- <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
      .bg-purple {
        background-color: purple;
      }
    </style>
  </head>
  <body class="p-5">
    <div class="container">
      <h3>Codesealer Lab</h3>

      <!-- Ajax Form Request - Thymeleaf + JQuery Ajax -->
      <form id="labForm">
        <input
          type="text"
          id="myData"
          class="form-control mb-2"
          placeholder="Enter text"
        />
        <button type="submit" class="btn btn-success">Send Ajax POST</button>
        <button type="button" id="jqueryGetBtn" class="btn btn-outline-info">
          Ajax GET
        </button>
      </form>
      <div id="output" class="mt-4"></div>

      <!-- Vanilla JS Request -->
      <div class="card shadow mt-4">
        <div class="card-header bg-warning text-black">
          Vanilla JS (Fetch) Test
        </div>
        <div class="card-body">
          <button type="button" id="vanillaBtn" class="btn btn-dark">
            Send via Fetch (Vanilla JS)
          </button>
          <div id="vanillaOutput" class="mt-3"></div>
        </div>
      </div>

      <!-- Pure Jquery Ajax POST Request -->
      <div class="card shadow mt-4">
        <div class="card-header bg-primary text-white">
          Pure jQuery Ajax Post Test
        </div>
        <div class="card-body">
          <button type="button" id="pureJqueryAjaxBtn" class="btn btn-dark">
            Send via Pure jQuery Ajax
          </button>
          <div id="pureJqueryAjaxOutput" class="mt-3"></div>
        </div>
      </div>

      <!-- Axois Request -->
      <div class="card shadow mt-4">
        <div class="card-header bg-purple text-white">
          Axios Test (Modern Promise-based)
        </div>
        <div class="card-body">
          <button type="button" id="axiosBtn" class="btn btn-dark">
            Send via Axios
          </button>
          <div id="axiosOutput" class="mt-3"></div>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      /*<![CDATA[*/
      // --- JQuery Ajax POST Request ---
      document
        .getElementById("labForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          // Thymeleaf injects the value here before the browser sees it
          const secret = /*[[${backendToken}]]*/ "default";
          const val = $("#myData").val();

          $.ajax({
            type: "POST",
            url: "/api/test",
            contentType: "application/json",
            data: JSON.stringify({ data: val, token: secret }),
            success: function (res) {
              $("#output").html(
                `<div class="alert alert-success">${res.result} (Token: ${res.tokenUsed})</div>`,
              );
            },
          });
        });

      // --- JQuery Ajax GET Request ---
      document
        .getElementById("jqueryGetBtn")
        .addEventListener("click", function () {
          console.log("Attempting jQuery GET...");

          $.ajax({
            type: "GET",
            url: "/api/test-get",
            data: { id: "123" }, // Sent as query params: ?id=123
            success: function (res) {
              $("#output").html(`
                    <div class="alert alert-info">
                        <strong>GET Success!</strong><br>
                        ${res.message}<br>
                        <small>Time: ${res.timestamp}</small>
                    </div>
                `);
            },
            error: function (xhr) {
              $("#output").html(
                `<div class="alert alert-danger">GET Error: ${xhr.status}</div>`,
              );
            },
          });
        });

      // 2. Vanilla JS Request
      document
        .getElementById("vanillaBtn")
        .addEventListener("click", function () {
          const secret = /*[[${backendToken}]]*/ "default";
          const val = document.getElementById("myData").value; // Using vanilla DOM access
          const outputDiv = document.getElementById("vanillaOutput");

          console.log("Attempting Vanilla Fetch with token:", secret);

          fetch("/api/test", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              data: val + " (via Fetch)",
              token: secret,
            }),
          })
            .then((response) => {
              if (!response.ok) {
                // This is where you'll likely see the 401 or 404
                throw new Error(
                  "Server responded with status: " + response.status,
                );
              }
              return response.json();
            })
            .then((res) => {
              outputDiv.innerHTML = `<div class="alert alert-warning">Fetch Success: ${res.result}</div>`;
            })
            .catch((error) => {
              console.error("Fetch Error:", error);
              outputDiv.innerHTML = `<div class="alert alert-danger">Fetch Error: ${error.message}</div>`;
            });
        });

      //3. Axios Post Request
      document
        .getElementById("axiosBtn")
        .addEventListener("click", function () {
          const secret = /*[[${backendToken}]]*/ "default";
          const val = document.getElementById("myData").value;
          const outputDiv = document.getElementById("axiosOutput");

          console.log("Attempting Axios POST...");

          // Axios syntax is very similar to jQuery but returns a Promise
          axios
            .post("/api/test", {
              data: val + " (via Axios)",
              token: secret,
            })
            .then(function (response) {
              // response.data contains the JSON returned by Spring
              outputDiv.innerHTML = `<div class="alert alert-primary">Axios Success: ${response.data.result}</div>`;
            })
            .catch(function (error) {
              // Detailed error reporting for Codesealer troubleshooting
              const status = error.response
                ? error.response.status
                : "Network/Security Error";
              outputDiv.innerHTML = `<div class="alert alert-danger">Axios Error: ${status}</div>`;
              console.error("Axios Fail Details:", error);
            });
        });
      /*]]>*/
    </script>
    <script>
      $(document).ready(function () {
        $("#pureJqueryAjaxBtn").on("click", function () {
          console.log("Attempting Static Script jQuery POST...");

          $.ajax({
            type: "POST",
            url: "/api/test",
            contentType: "application/json",
            data: JSON.stringify({
              data: "Static Script Test",
              token: "PURE_JQUERY_AJAX_POST",
            }),
            success: function (res) {
              $("#pureJqueryAjaxOutput").html(
                `<div class="alert alert-info">Static Success: ${res.result}</div>`,
              );
            },
            error: function (xhr) {
              $("#pureJqueryAjaxOutput").html(
                `<div class="alert alert-danger">Static Error: ${xhr.status}</div>`,
              );
            },
          });
        });
      });
    </script>
  </body>
</html>
